<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Compact Keyboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:#1c1c1e;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
#app{width:100%;height:100%;display:flex;flex-direction:column}
header{padding:10px 14px;background:rgba(0,0,0,0.6);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:space-between}
header h1{font-size:15px;font-weight:600}
.badge{font-size:9px;padding:2px 7px;background:#007aff;border-radius:10px;font-weight:500}
.chat{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:6px}
.chat>div{max-width:80%;padding:8px 12px;border-radius:16px;font-size:14px;line-height:1.4;word-break:break-word}
.chat .sent{align-self:flex-end;background:#007aff;color:#fff;border-bottom-right-radius:4px}
.chat .recv{align-self:flex-start;background:#2c2c2e;color:#e5e5ea;border-bottom-left-radius:4px}
.input-area{padding:6px 12px 4px;display:flex;align-items:center;gap:6px}
.input-area .preview{flex:1;background:#1c1c1e;border:1px solid #3a3a3c;border-radius:18px;padding:6px 12px;font-size:15px;color:#fff;min-height:32px;display:flex;align-items:center;overflow-x:auto;white-space:nowrap}
.input-area .preview .cursor{display:inline-block;width:2px;height:16px;background:#007aff;margin-left:1px;animation:blink 1s step-end infinite}
@keyframes blink{50%{opacity:0}}
.mode-label{font-size:9px;color:#8e8e93;padding:3px 7px;background:#1c1c1e;border-radius:8px;white-space:nowrap;border:1px solid #3a3a3c}

/* Keyboard */
.ckb{background:#1c1c1e;padding:2px;width:100%;position:relative}
.ckb-row{display:flex;gap:2px;width:100%;padding:0}
.ckb-key{flex:1;display:flex;align-items:center;justify-content:center;background:#2c2c2e;color:#fff;border:none;border-radius:5px;font-size:10px;font-weight:500;padding:3px 0;cursor:pointer;position:relative;-webkit-tap-highlight-color:transparent;outline:none;font-family:inherit;line-height:1;min-height:30px;touch-action:manipulation}
.ckb-key:active,.ckb-key.pressed{background:#3a3a3c!important;transform:scale(0.93)}
.ckb-key.special{background:#3a3a3c;font-size:12px}
.ckb-key.compact{font-size:8px;letter-spacing:-0.2px;flex-direction:column;padding:1px 0;min-height:30px}
.ckb-key.compact .big{font-size:11px;font-weight:600}
.ckb-key.compact .small{font-size:6px;color:#8e8e93}
.ckb-key .multi{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:12px;font-weight:600;color:#0a84ff;pointer-events:none}
.ckb-comp{position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:#2c2c2e;color:#0a84ff;font-size:14px;font-weight:600;padding:2px 14px;border-radius:8px 8px 0 0;z-index:10}

/* Predictions */
.ckb-pred{display:flex;gap:3px;padding:3px 6px;overflow-x:auto;scrollbar-width:none;background:#1c1c1e;border-bottom:1px solid rgba(128,128,128,0.15);min-height:28px}
.ckb-pred::-webkit-scrollbar{display:none}
.ckb-pred button{flex-shrink:0;padding:2px 8px;border:none;border-radius:10px;background:#2c2c2e;color:#0a84ff;font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap}
.ckb-pred button:active{opacity:0.7}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>⌨️ Compact KB</h1>
    <span class="badge" id="modeBadge">compact</span>
  </header>
  <div class="chat" id="chat">
    <div class="recv">⬇️ Tap letter groups to cycle</div>
    <div class="recv">⬇️ ◉ switches modes</div>
    <div class="recv">⬇️ Arrow keys ←↑↓→ move cursor</div>
  </div>
  <div class="input-area">
    <div class="preview" id="preview"><span id="textDisplay"></span><span class="cursor"></span></div>
    <span class="mode-label" id="modeLabel">compact</span>
  </div>
  <div id="predBar" class="ckb-pred"></div>
  <div class="ckb" id="kb"></div>
</div>
<script>
// ===== COMPACT KEYBOARD - Vanilla JS =====
var textDisplay = document.getElementById('textDisplay');
var modeLabel = document.getElementById('modeLabel');
var modeBadge = document.getElementById('modeBadge');
var predBar = document.getElementById('predBar');
var kb = document.getElementById('kb');
var chat = document.getElementById('chat');

var text = '';
var cursor = 0;
var composition = '';
var inputMode = 'compact'; // compact | t9 | swipe

// Word frequency for predictions
var DICT = {
  the:1,be:.98,to:.97,of:.96,and:.95,a:.94,in:.93,that:.92,have:.91,
  it:.90,for:.89,not:.88,on:.87,with:.86,he:.85,as:.84,you:.83,do:.82,
  at:.81,this:.80,but:.79,his:.78,by:.77,from:.76,they:.75,we:.74,
  say:.73,her:.72,she:.71,or:.70,an:.69,will:.68,my:.67,one:.66,
  all:.65,would:.64,there:.63
};

// Layouts
var COMPACT_KEYS = [
  {label:'abc', chars:['a','b','c']},
  {label:'def', chars:['d','e','f']},
  {label:'ghi', chars:['g','h','i']},
  {label:'jkl', chars:['j','k','l']},
  {label:'mno', chars:['m','n','o']},
  {label:'pqrs',chars:['p','q','r','s']},
  {label:'tuv', chars:['t','u','v']},
  {label:'wxyz',chars:['w','x','y','z']},
  {label:'/',   chars:['/'], single:true},
  {label:'#',   chars:['#'], single:true},
  {label:'←',   action:'left'},
  {label:'↑',   action:'up'},
  {label:'↓',   action:'down'},
  {label:'→',   action:'right'},
  {label:'⌫',   action:'backspace'},
  {label:'◉',   action:'mode'},
];

var T9_KEYS = [
  [{label:'abc',chars:['a','b','c']},{label:'def',chars:['d','e','f']},{label:'ghi',chars:['g','h','i']}],
  [{label:'jkl',chars:['j','k','l']},{label:'mno',chars:['m','n','o']},{label:'pqrs',chars:['p','q','r','s']}],
  [{label:'tuv',chars:['t','u','v']},{label:'wxyz',chars:['w','x','y','z']},{label:'⌫',action:'backspace'}],
  [{label:'◉',action:'mode'},{label:'␣',action:'space'},{label:'↵',action:'enter'}],
];

var SWIPE_DIRS = [
  {dir:'←',letters:'ABCD'},{dir:'→',letters:'EFGH'},{dir:'↑',letters:'IJKLM'},{dir:'↓',letters:'NOPQR'},
  {dir:'↙',letters:'ST'},{dir:'↘',letters:'UV'},{dir:'↖',letters:'WX'},{dir:'↗',letters:'YZ'},
];

function updateDisplay() {
  textDisplay.textContent = text || 'Type...';
  updatePredictions();
}

function updatePredictions() {
  var words = text.split(/\s+/);
  var last = words[words.length-1] || '';
  predBar.innerHTML = '';
  if (!last) return;
  var matches = Object.keys(DICT).filter(function(w){return w.startsWith(last);}).sort(function(a,b){return DICT[b]-DICT[a];}).slice(0,3);
  matches.forEach(function(w) {
    var btn = document.createElement('button');
    btn.textContent = w;
    btn.onclick = function() {
      words[words.length-1] = w;
      text = words.join(' ') + ' ';
      cursor = text.length;
      composition = '';
      updateDisplay();
    };
    predBar.appendChild(btn);
  });
}

function insertChar(ch) {
  text = text.slice(0,cursor) + ch + text.slice(cursor);
  cursor += ch.length;
  composition = '';
  updateDisplay();
}

function deleteChar() {
  if (cursor <= 0) return;
  text = text.slice(0,cursor-1) + text.slice(cursor);
  cursor--;
  composition = '';
  updateDisplay();
}

function moveCursor(dir) {
  if (dir === 'left') cursor = Math.max(0,cursor-1);
  else if (dir === 'right') cursor = Math.min(text.length,cursor+1);
  else if (dir === 'up') { var i = text.slice(0,cursor).lastIndexOf('\n'); cursor = i>0?i:0; }
  else if (dir === 'down') { var i = text.slice(cursor).indexOf('\n'); cursor = i>=0?cursor+i+1:text.length; }
  composition = '';
  updateDisplay();
}

function commitComp() {
  if (composition) { insertChar(composition); composition = ''; }
}

function sendMessage() {
  if (!text.trim()) return;
  var msg = document.createElement('div');
  msg.className = 'sent';
  msg.textContent = text.trim();
  chat.appendChild(msg);
  text = '';
  cursor = 0;
  updateDisplay();
  chat.scrollTop = chat.scrollHeight;
  setTimeout(function() {
    var r = document.createElement('div');
    r.className = 'recv';
    r.textContent = 'Got: "' + (msg.textContent || '') + '"';
    chat.appendChild(r);
    chat.scrollTop = chat.scrollHeight;
  }, 500);
}

function handleKey(k) {
  if (k.action === 'backspace') { commitComp(); deleteChar(); return; }
  if (k.action === 'space') { commitComp(); insertChar(' '); return; }
  if (k.action === 'enter') { commitComp(); sendMessage(); return; }
  if (k.action === 'left'||k.action === 'right'||k.action === 'up'||k.action === 'down') { commitComp(); moveCursor(k.action); return; }
  if (k.action === 'mode') {
    commitComp();
    var modes = ['compact','t9','swipe'];
    var idx = modes.indexOf(inputMode);
    inputMode = modes[(idx+1)%modes.length];
    modeLabel.textContent = inputMode;
    modeBadge.textContent = inputMode;
    renderKeyboard();
    return;
  }
  if (k.single) { insertChar(k.chars[0]); return; }
  if (!k.chars) return;
  if (composition) {
    var i = k.chars.indexOf(composition);
    if (i >= 0 && i < k.chars.length - 1) { composition = k.chars[i+1]; }
    else { commitComp(); composition = k.chars[0]; }
  } else { composition = k.chars[0]; }
  updateDisplay();
  showComposition();
}

function showComposition() {
  var el = document.getElementById('compDisplay');
  if (!composition && el) { el.remove(); return; }
  if (!composition) return;
  if (!el) {
    el = document.createElement('div');
    el.id = 'compDisplay';
    el.className = 'ckb-comp';
    kb.parentElement.appendChild(el);
  }
  el.textContent = composition;
}

// Event helper - works on both touch and mouse
function onPress(btn, fn) {
  function handler(e) {
    e.preventDefault();
    fn();
    btn.classList.add('pressed');
  }
  function release() { btn.classList.remove('pressed'); }
  btn.addEventListener('pointerdown', handler);
  btn.addEventListener('touchstart', handler);
  btn.addEventListener('pointerup', release);
  btn.addEventListener('pointerleave', release);
  btn.addEventListener('touchend', release);
  btn.addEventListener('touchcancel', release);
}

function renderKeyboard() {
  kb.innerHTML = '';
  var compEl = document.getElementById('compDisplay');
  if (compEl) compEl.remove();
  composition = '';

  if (inputMode === 'compact') {
    var row = document.createElement('div');
    row.className = 'ckb-row';
    COMPACT_KEYS.forEach(function(k) {
      var btn = document.createElement('button');
      btn.className = 'ckb-key compact';
      if (k.action === 'backspace' || k.action === 'mode') btn.classList.add('special');
      if (k.chars && !k.single) {
        var big = document.createElement('span');
        big.className = 'big';
        big.textContent = k.chars[0];
        var small = document.createElement('span');
        small.className = 'small';
        small.textContent = k.label;
        btn.appendChild(big);
        btn.appendChild(small);
        onPress(btn, function() { handleKey(k); });
      } else {
        btn.textContent = k.label;
        onPress(btn, function() { handleKey(k); });
      }
      row.appendChild(btn);
    });
    kb.appendChild(row);
  }
  else if (inputMode === 't9') {
    T9_KEYS.forEach(function(rowDef) {
      var row = document.createElement('div');
      row.className = 'ckb-row';
      rowDef.forEach(function(k) {
        var btn = document.createElement('button');
        btn.className = 'ckb-key';
        if (k.action) btn.classList.add('special');
        btn.textContent = k.label;
        onPress(btn, function() { handleKey(k); });
        row.appendChild(btn);
      });
      kb.appendChild(row);
    });
  }
  else if (inputMode === 'swipe') {
    var row = document.createElement('div');
    row.className = 'ckb-row';
    row.style.flexWrap = 'wrap';
    SWIPE_DIRS.forEach(function(d) {
      var btn = document.createElement('button');
      btn.className = 'ckb-key compact special';
      btn.style.flex = '1 1 22%';
      btn.innerHTML = '<span style="font-size:12px">'+d.dir+'</span><span style="font-size:6px;opacity:.5">'+d.letters+'</span>';
      onPress(btn, function() {});
      row.appendChild(btn);
    });
    var bs = document.createElement('button');
    bs.className = 'ckb-key special'; bs.style.flex = '1 1 30%'; bs.textContent = '⌫';
    onPress(bs, function() { deleteChar(); });
    row.appendChild(bs);
    var sp = document.createElement('button');
    sp.className = 'ckb-key special'; sp.style.flex = '1 1 22%'; sp.textContent = '␣';
    onPress(sp, function() { insertChar(' '); });
    row.appendChild(sp);
    kb.appendChild(row);
  }
}

renderKeyboard();
updateDisplay();
</script>
</body>
</html>
