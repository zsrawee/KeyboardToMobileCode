<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Compact Keyboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-user-select:none}
html,body{width:100%;height:100%;background:#1c1c1e;color:#fff;font-family:sans-serif;overflow:hidden}
#app{display:flex;flex-direction:column;height:100%}
.output{flex:1;padding:14px;font-size:17px;overflow-y:auto;word-break:break-word;white-space:pre-wrap;line-height:1.5}
.output .msg{margin:6px 0;padding:8px 12px;border-radius:14px;max-width:85%;font-size:15px}
.output .sent{background:#007aff;color:#fff;align-self:flex-end;border-bottom-right-radius:4px;margin-left:auto}
.output .recv{background:#2c2c2e;color:#e5e5ea;align-self:flex-start;border-bottom-left-radius:4px}

.row{display:flex;gap:2px;padding:1px 2px;background:#111;width:100%}
.key{flex:1;display:flex;align-items:center;justify-content:center;background:#2c2c2e;border-radius:5px;font-size:12px;font-weight:500;padding:5px 0;min-height:34px;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;border:none;color:#fff;font-family:inherit;position:relative;transition:transform .05s}
.key:active,.key.down{background:#3a3a3c!important;transform:scale(0.92)!important}
.key.sp{background:#3a3a3c;font-size:14px}
.key.w2{flex:1.8}
.key.w3{flex:2.5}

#textArea{display:inline;white-space:pre-wrap}
#cursor{display:inline-block;width:2px;height:19px;background:#0a84ff;animation:blink .8s step-end infinite;vertical-align:text-bottom;margin:0 0 0 0}
@keyframes blink{50%{opacity:0}}

.top-bar{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:#1c1c1e;border-bottom:1px solid #333}
.top-bar .mode-badge{font-size:10px;color:#888;background:#2c2c2e;padding:3px 10px;border-radius:8px}
.top-bar .lang-btn{font-size:12px;background:0 0;border:none;color:#0a84ff;cursor:pointer;padding:4px 8px;border-radius:6px;font-weight:500}
.top-bar .lang-btn:active{background:#0a84ff22}

.pred{display:flex;gap:3px;padding:2px 6px;overflow-x:auto;background:#111;min-height:24px;border-bottom:1px solid #222}
.pred button{flex-shrink:0;padding:2px 10px;border:none;border-radius:10px;background:#2c2c2e;color:#0a84ff;font-size:11px;cursor:pointer;white-space:nowrap}
.pred button:active{opacity:.7}
</style>
</head>
<body>
<div id="app">
 <div class="top-bar">
  <button class="lang-btn" id="langBtn">🇸🇦 العربية</button>
  <span class="mode-badge" id="modeBadge">compact</span>
 </div>
 <div class="pred" id="predBar"></div>
 <div class="output" id="output">
  <span id="beforeText"></span><span id="cursor"></span><span id="afterText"></span>
 </div>
 <div id="keyboard"></div>
</div>
<script>
// === DOM refs ===
const beforeSpan=document.getElementById('beforeText'),afterSpan=document.getElementById('afterText'),
      cursor=document.getElementById('cursor'),out=document.getElementById('output'),
      kb=document.getElementById('keyboard'),predBar=document.getElementById('predBar'),
      modeBadge=document.getElementById('modeBadge'),langBtn=document.getElementById('langBtn');

// === State ===
let text='',cursorPos=0,comp='',mode='compact',lang='en';
const DICT={
 en:{the:1,be:.98,to:.97,of:.96,and:.95,a:.94,in:.93,that:.92,have:.91,it:.90,for:.89,not:.88,on:.87,with:.86,he:.85,as:.84,you:.83,do:.82,at:.81,this:.80,but:.79,his:.78,by:.77,from:.76,they:.75,we:.74,say:.73,her:.72,she:.71,or:.70,an:.69,will:.68,my:.67,one:.66,all:.65,would:.64,there:.63},
 ar:{}
};

// === Layouts ===
const LAYOUTS={
 en:{
  r1:[{l:'abc',c:['a','b','c']},{l:'def',c:['d','e','f']},{l:'ghi',c:['g','h','i']},{l:'jkl',c:['j','k','l']},{l:'mno',c:['m','n','o']},{l:'pqrs',c:['p','q','r','s']},{l:'tuv',c:['t','u','v']},{l:'wxyz',c:['w','x','y','z']}],
  r2:[{l:'/',c:['/'],s:1},{l:'#',c:['#'],s:1},{l:'←',a:'l'},{l:'↑',a:'u'},{l:'↓',a:'d'},{l:'→',a:'r'},{l:'⌫',a:'b'}],
  r3:[{l:'🌐',a:'lang'},{l:'␣',a:'sp'},{l:'↵',a:'enter'},{l:'◉',a:'m'}]
 },
 ar:{
  r1:[{l:'ابت',c:['ا','ب','ت']},{l:'ثجح',c:['ث','ج','ح']},{l:'خدذ',c:['خ','د','ذ']},{l:'رزس',c:['ر','ز','س']},{l:'شصض',c:['ش','ص','ض']},{l:'طظع',c:['ط','ظ','ع']},{l:'غفق',c:['غ','ف','ق']},{l:'كلم',c:['ك','ل','م']},{l:'نهوي',c:['ن','ه','و','ي']}],
  r2:[{l:'/',c:['/'],s:1},{l:'#',c:['#'],s:1},{l:'←',a:'l'},{l:'↑',a:'u'},{l:'↓',a:'d'},{l:'→',a:'r'},{l:'⌫',a:'b'}],
  r3:[{l:'EN',a:'lang'},{l:'␣',a:'sp'},{l:'↵',a:'enter'},{l:'◉',a:'m'}]
 }
};

// === Core functions ===
function vib(m){try{navigator.vibrate&&navigator.vibrate(m)}catch(e){}}
function upd(){
 const before=text.slice(0,cursorPos);
 const after=text.slice(cursorPos);
 beforeSpan.textContent=before;
 afterSpan.textContent=after;
 out.scrollTop=out.scrollHeight;
 updatePredictions();
}
function updatePredictions(){
 predBar.innerHTML='';
 const words=text.split(/\s+/),last=words[words.length-1]||'';
 if(!last||lang==='ar')return;
 Object.keys(DICT.en).filter(w=>w.startsWith(last)).sort((a,b)=>DICT.en[b]-DICT.en[a]).slice(0,3).forEach(w=>{
  const b=document.createElement('button');b.textContent=w;
  b.onclick=()=>{words[words.length-1]=w;text=words.join(' ')+' ';cursorPos=text.length;comp='';upd()};
  predBar.appendChild(b)
 });
}
function commitComp(){if(comp){ins(comp);comp=''}}
function ins(ch){
 text=text.slice(0,cursorPos)+ch+text.slice(cursorPos);
 cursorPos+=ch.length;comp='';upd();vib(8);
}
function del(){
 if(comp){comp='';upd();return}
 if(cursorPos<=0)return;
 text=text.slice(0,cursorPos-1)+text.slice(cursorPos);
 cursorPos--;upd();vib(12);
}
function mv(d){
 if(d=='l')cursorPos=Math.max(0,cursorPos-1);
 if(d=='r')cursorPos=Math.min(text.length,cursorPos+1);
 if(d=='u'){const i=text.slice(0,cursorPos).lastIndexOf('\n');cursorPos=i>0?i:0}
 if(d=='d'){const i=text.slice(cursorPos).indexOf('\n');cursorPos=i>=0?cursorPos+i+1:text.length}
 comp='';upd();vib(4);
}
function sendMsg(){
 const t=text.trim();if(!t)return;
 const m=document.createElement('div');m.className='msg sent';m.textContent=t;
 out.insertBefore(m,out.firstChild);
 text='';cursorPos=0;comp='';upd();
}
function addReply(t){
 const m=document.createElement('div');m.className='msg recv';m.textContent=t;
 out.insertBefore(m,out.firstChild);
}

// === Key handler ===
function handleKey(k){
 if(k.a=='b'){del();return}
 if(k.a=='l'||k.a=='r'||k.a=='u'||k.a=='d'){mv(k.a);return}
 if(k.a=='sp'){commitComp();ins(' ');return}
 if(k.a=='enter'){commitComp();sendMsg();return}
 if(k.a=='lang'){lang=(lang=='en')?'ar':'en';langBtn.textContent=(lang=='ar')?'🇬🇧 English':'🇸🇦 العربية';render();return}
 if(k.a=='m'){
  commitComp();
  const ms=['compact','t9','swipe'];
  let i=ms.indexOf(mode);mode=ms[(i+1)%3];
  modeBadge.textContent=mode;render();upd();return
 }
 // Character
 if(k.s){ins(k.c[0]);return}
 if(!k.c)return;
 // Multi-tap
 if(comp){
  const i=k.c.indexOf(comp);
  if(i>=0&&i<k.c.length-1){comp=k.c[i+1]}else{commitComp();comp=k.c[0]}
 }else{comp=k.c[0]}
 upd();
}

// === Render ===
function render(){
 kb.innerHTML='';
 const L=LAYOUTS[lang];
 const rows=[L.r1,L.r2,L.r3];
 rows.forEach((keys,ri)=>{
  const r=document.createElement('div');r.className='row';
  keys.forEach(k=>{
   const b=document.createElement('button');b.className='key';
   if(k.a=='b'||k.a=='m'||k.a=='lang')b.classList.add('sp');
   if(k.a=='sp'||k.a=='enter')b.classList.add('w2');
   b.textContent=k.l;
   b.onpointerdown=e=>{
    e.preventDefault();b.classList.add('down');
    handleKey(k);
   };
   b.onpointerup=()=>b.classList.remove('down');
   b.onpointerleave=()=>b.classList.remove('down');
   r.appendChild(b);
  });
  kb.appendChild(r);
 });
}
render();upd();

// Auto reply demo
addReply('⬇️ Keyboard with /, #, arrows, Enter, Arabic!');
</script>
</body>
</html>
