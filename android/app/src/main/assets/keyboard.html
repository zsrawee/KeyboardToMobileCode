<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Compact KB IME</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-user-select:none}
html,body{width:100%;height:100%;background:#1c1c1e;color:#fff;font-family:Roboto,sans-serif;overflow:hidden}
#app{display:flex;flex-direction:column;height:100%}
.row{display:flex;gap:2px;padding:1px;background:#111;width:100%}
.key{flex:1;display:flex;align-items:center;justify-content:center;background:#2c2c2e;border-radius:5px;font-size:12px;font-weight:500;padding:4px 0;min-height:36px;touch-action:manipulation;-webkit-tap-highlight-color:transparent;border:none;color:#fff;font-family:inherit}
.key.down{background:#3a3a3c!important;transform:scale(0.92)!important}
.key.sp{background:#3a3a3c;font-size:14px}
.key.w2{flex:1.8}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:4px 8px;background:#1c1c1e;border-bottom:1px solid #333;min-height:24px}
.top-bar span{font-size:9px;color:#888}
.top-bar .btns{display:flex;gap:6px}
.top-bar button{font-size:10px;background:0 0;border:none;color:#0a84ff;cursor:pointer;padding:2px 6px;border-radius:4px}
.top-bar button:active{background:#0a84ff22}
.pred{display:flex;gap:3px;padding:2px 6px;overflow-x:auto;background:#111;min-height:22px;border-bottom:1px solid #222}
.pred button{flex-shrink:0;padding:1px 8px;border:none;border-radius:8px;background:#2c2c2e;color:#0a84ff;font-size:10px;cursor:pointer;white-space:nowrap}
.pred button:active{opacity:.7}
.comp-indicator{position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:#2c2c2e;color:#0a84ff;font-size:16px;font-weight:600;padding:2px 16px;border-radius:8px 8px 0 0;z-index:10;white-space:nowrap}
</style>
</head>
<body>
<div id="app">
 <div class="top-bar">
  <button id="langBtn" style="font-size:11px">🌐</button>
  <span id="modeLabel">compact</span>
  <div class="btns">
   <button id="imeBtn">⌨️</button>
   <button id="closeBtn">✕</button>
  </div>
 </div>
 <div class="pred" id="predBar"></div>
 <div id="kb"></div>
</div>
<script>
// Global error handler
window.onerror = function(msg,url,line) {
  try { Android.commitText('[err]'); } catch(e) {}
  return true;
};

let comp='',mode='compact',lang='en';

const L={
 en:{
  r1:[{l:'abc',c:['a','b','c']},{l:'def',c:['d','e','f']},{l:'ghi',c:['g','h','i']},{l:'jkl',c:['j','k','l']},{l:'mno',c:['m','n','o']},{l:'pqrs',c:['p','q','r','s']},{l:'tuv',c:['t','u','v']},{l:'wxyz',c:['w','x','y','z']}],
  r2:[{l:'/',c:['/'],s:1},{l:'#',c:['#'],s:1},{l:'←',a:'left'},{l:'↑',a:'up'},{l:'↓',a:'down'},{l:'→',a:'right'},{l:'⌫',a:'del'}],
  r3:[{l:'🌐',a:'lang'},{l:'␣',a:'space'},{l:'↵',a:'enter'},{l:'123',a:'num'},{l:'◉',a:'mode'}]
 },
 ar:{
  r1:[{l:'ابت',c:['ا','ب','ت']},{l:'ثجح',c:['ث','ج','ح']},{l:'خدذ',c:['خ','د','ذ']},{l:'رزس',c:['ر','ز','س']},{l:'شصض',c:['ش','ص','ض']},{l:'طظع',c:['ط','ظ','ع']},{l:'غفق',c:['غ','ف','ق']},{l:'كلم',c:['ك','ل','م']},{l:'نهوي',c:['ن','ه','و','ي']}],
  r2:[{l:'/',c:['/'],s:1},{l:'#',c:['#'],s:1},{l:'←',a:'left'},{l:'↑',a:'up'},{l:'↓',a:'down'},{l:'→',a:'right'},{l:'⌫',a:'del'}],
  r3:[{l:'EN',a:'lang'},{l:'␣',a:'space'},{l:'↵',a:'enter'},{l:'123',a:'num'},{l:'◉',a:'mode'}]
 }
};

const SYM={
 r1:[{l:'1',c:['1'],s:1},{l:'2',c:['2'],s:1},{l:'3',c:['3'],s:1},{l:'4',c:['4'],s:1},{l:'5',c:['5'],s:1},{l:'6',c:['6'],s:1},{l:'7',c:['7'],s:1},{l:'8',c:['8'],s:1},{l:'9',c:['9'],s:1},{l:'0',c:['0'],s:1}],
 r2:[{l:'@',c:['@'],s:1},{l:'!',c:['!'],s:1},{l:'?',c:['?'],s:1},{l:'.',c:['.'],s:1},{l:',',c:[','],s:1},{l:"'",c:["'"],s:1},{l:'"',c:['"'],s:1},{l:';',c:[';'],s:1},{l:':',c:[':'],s:1},{l:'-',c:['-'],s:1}],
 r3:[{l:'(',c:['('],s:1},{l:')',c:[')'],s:1},{l:'💬',a:'lang'},{l:'␣',a:'space'},{l:'↵',a:'enter'},{l:'ABC',a:'num'},{l:'⌫',a:'del'}]
};

let symbolMode=false;

function commitComp(){
 if(comp){try{Android.commitText(comp);}catch(e){}comp=''}
}

function handleKey(k){
 try{
  if(k.a=='del'){commitComp();try{Android.deleteBackward();}catch(e){}return}
  if(k.a=='left'||k.a=='right'||k.a=='up'||k.a=='down'){commitComp();try{Android.moveCursor(k.a);}catch(e){}return}
  if(k.a=='space'){commitComp();try{Android.commitText(' ');}catch(e){}return}
  if(k.a=='enter'){commitComp();try{Android.sendEnter();}catch(e){}return}
  if(k.a=='lang'){lang=(lang=='en')?'ar':'en';symbolMode=false;document.getElementById('langBtn').textContent=lang=='en'?'🌐':'EN';render();return}
  if(k.a=='num'){symbolMode=!symbolMode;commitComp();render();return}
  if(k.a=='mode'){
   commitComp();
   const ms=['compact','t9','swipe'];
   let i=ms.indexOf(mode);mode=ms[(i+1)%3];
   document.getElementById('modeLabel').textContent=mode;
   symbolMode=false;render();return
  }
  // Character keys
  if(k.s){try{Android.commitText(k.c[0]);}catch(e){}return}
  if(!k.c)return;
  // Multi-tap
  if(comp){
   const i=k.c.indexOf(comp);
   if(i>=0&&i<k.c.length-1){comp=k.c[i+1]}else{commitComp();comp=k.c[0]}
  }else{comp=k.c[0]}
  showComp();
  try{Android.vibrate(8);}catch(e){}
 }catch(e){}
}

function showComp(){
 try{
  let el=document.getElementById('ci');
  if(!comp&&el){el.remove();return}
  if(!comp)return;
  if(!el){el=document.createElement('div');el.id='ci';el.className='comp-indicator'}
  el.textContent=comp;
  var kb=document.getElementById('kb');
  if(el.parentNode!=kb)kb.appendChild(el);
 }catch(e){}
}

function render(){
 try{
  document.getElementById('kb').innerHTML='';
  var ci=document.getElementById('ci');if(ci)ci.remove();

  var rows;
  if(symbolMode){
   rows=[SYM.r1,SYM.r2,SYM.r3];
  } else {
   var Lx=L[lang];
   rows=[Lx.r1,Lx.r2,Lx.r3];
  }

  for(var ri=0;ri<rows.length;ri++){
   var keys=rows[ri];
   var r=document.createElement('div');r.className='row';
   for(var ki=0;ki<keys.length;ki++){
    var k=keys[ki];
    (function(key){
     var b=document.createElement('button');b.className='key';
     if(key.a=='del'||key.a=='mode'||key.a=='lang'||key.a=='num')b.classList.add('sp');
     if(key.a=='space'||key.a=='enter')b.classList.add('w2');
     b.textContent=key.l;
     b.addEventListener('touchstart',function(e){
      e.preventDefault();
      b.classList.add('down');
      handleKey(key);
     },{passive:false});
     b.addEventListener('touchend',function(){b.classList.remove('down');});
     b.addEventListener('touchcancel',function(){b.classList.remove('down');});
     // Pointer events as fallback
     b.addEventListener('pointerdown',function(e){e.preventDefault();b.classList.add('down');handleKey(key);});
     b.addEventListener('pointerup',function(){b.classList.remove('down');});
     b.addEventListener('pointerleave',function(){b.classList.remove('down');});
     r.appendChild(b);
    })(k);
   }
   document.getElementById('kb').appendChild(r);
  }
  showComp();
 }catch(e){}
}

// Set up top bar buttons
document.getElementById('langBtn').onclick=function(){lang=(lang=='en')?'ar':'en';symbolMode=false;this.textContent=lang=='en'?'🌐':'EN';render();};
document.getElementById('imeBtn').onclick=function(){try{Android.switchToNextIME();}catch(e){}};
document.getElementById('closeBtn').onclick=function(){try{Android.performBack();}catch(e){}};

render();
try{Android.vibrate(1);}catch(e){}
</script>
</body>
</html>
