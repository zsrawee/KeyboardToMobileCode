<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Compact Keyboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:#1c1c1e;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;touch-action:manipulation}
#root{width:100%;height:100%;display:flex;flex-direction:column}

/* ---- CSS Variables (dark theme for Android) ---- */
:root {
  --ckb-height: 52px;
  --ckb-font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  --ckb-bg: #1c1c1e;
  --ckb-key-bg: #2c2c2e;
  --ckb-key-bg-active: #3a3a3c;
  --ckb-key-text: #ffffff;
  --ckb-key-text-secondary: #8e8e93;
  --ckb-key-border-radius: 6px;
  --ckb-key-gap: 2px;
  --ckb-prediction-bg: #2c2c2e;
  --ckb-prediction-text: #0a84ff;
  --ckb-special-key-bg: #3a3a3c;
  --ckb-caret-color: #0a84ff;
}

/* ---- Prediction bar ---- */
.ckb-pred {
  display: flex;
  gap: 4px;
  padding: 4px 8px;
  overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
  background: var(--ckb-bg);
  border-bottom: 1px solid rgba(128,128,128,0.15);
  min-height: 32px;
}
.ckb-pred::-webkit-scrollbar { display: none; }
.ckb-pred button {
  flex-shrink: 0;
  padding: 2px 10px;
  border: none;
  border-radius: 12px;
  background: var(--ckb-prediction-bg);
  color: var(--ckb-prediction-text);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
}
.ckb-pred button:active { opacity: 0.7; }

/* ---- Keyboard body ---- */
.ckb-body {
  background: var(--ckb-bg);
  padding: 2px 2px;
  display: flex;
  flex-direction: column;
  gap: var(--ckb-key-gap);
  width: 100%;
  box-sizing: border-box;
  overflow: hidden;
}

/* ---- Single compact row ---- */
.ckb-row {
  display: flex;
  gap: var(--ckb-key-gap);
  flex: 1;
  justify-content: center;
}
.ckb-row-single {
  display: flex;
  gap: 1px;
  flex: 1;
  align-items: stretch;
  justify-content: space-evenly;
}

/* ---- Key base ---- */
.ckb-key {
  display: flex;
  align-items: center;
  justify-content: center;
  flex: 1;
  background: var(--ckb-key-bg);
  color: var(--ckb-key-text);
  border: none;
  border-radius: var(--ckb-key-border-radius);
  font-size: 11px;
  font-weight: 500;
  padding: 0 1px;
  cursor: pointer;
  position: relative;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  outline: none;
  min-width: 0;
  font-family: var(--ckb-font-family);
  line-height: 1;
  min-height: 36px;
}
.ckb-key:active,
.ckb-key-active {
  background: var(--ckb-key-bg-active) !important;
  transform: scale(0.95);
}
.ckb-key-special {
  background: var(--ckb-special-key-bg);
  font-size: 14px;
}
.ckb-key-wide { flex: 1.5; }
.ckb-key-space { flex: 2.5; }

/* ---- Compact row key ---- */
.ckb-key-compact {
  font-size: 9px;
  letter-spacing: -0.3px;
  flex-direction: column;
  padding: 1px 0;
}
.ckb-key-compact .ckb-key-primary {
  font-size: 12px;
  font-weight: 600;
}
.ckb-key-compact .ckb-key-secondary {
  font-size: 7px;
  color: var(--ckb-key-text-secondary);
  letter-spacing: -0.2px;
}

/* ---- Composition display ---- */
.ckb-comp {
  position: absolute;
  bottom: 100%;
  left: 50%;
  transform: translateX(-50%);
  background: var(--ckb-prediction-bg);
  color: var(--ckb-prediction-text);
  font-size: 14px;
  font-weight: 600;
  padding: 2px 14px;
  border-radius: 8px 8px 0 0;
  z-index: 10;
  white-space: nowrap;
}

/* ---- Mode indicator ---- */
.ckb-mode {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  color: var(--ckb-key-text-secondary);
  padding: 2px 4px;
  background: var(--ckb-special-key-bg);
  border-radius: 4px;
  margin: 0 2px;
  flex: 0.6;
  min-width: 28px;
}
</style>
</head>
<body>
<div id="root">
  <div id="predBar" class="ckb-pred"></div>
  <div id="kb" class="ckb-body"></div>
</div>
<script>
// ============================================================
// Compact Keyboard – Android IME WebView
// Communicates with Java bridge via Android.*
// ============================================================

// --- State ---
let composition = '';
let inputMode = 'compact'; // compact | t9 | swipe
let tapTimeout = null;
const COMP_TIMEOUT = 1200; // auto-commit after 1.2s

// --- Layout: compact single row ---
const COMPACT_KEYS = [
  { label:'abc', chars:['a','b','c'] },
  { label:'def', chars:['d','e','f'] },
  { label:'ghi', chars:['g','h','i'] },
  { label:'jkl', chars:['j','k','l'] },
  { label:'mno', chars:['m','n','o'] },
  { label:'pqrs',chars:['p','q','r','s'] },
  { label:'tuv', chars:['t','u','v'] },
  { label:'wxyz',chars:['w','x','y','z'] },
  { label:'/',   chars:['/'], single:true },
  { label:'#',   chars:['#'], single:true },
  { label:'←',   action:'left' },
  { label:'↑',   action:'up' },
  { label:'↓',   action:'down' },
  { label:'→',   action:'right' },
  { label:'⌫',   action:'backspace' },
  { label:'◉',   action:'mode' },
];

// --- T9 keypad ---
const T9_KEYS = [
  [{label:'abc', chars:['a','b','c']},{label:'def', chars:['d','e','f']},{label:'ghi', chars:['g','h','i']}],
  [{label:'jkl', chars:['j','k','l']},{label:'mno', chars:['m','n','o']},{label:'pqrs',chars:['p','q','r','s']}],
  [{label:'tuv', chars:['t','u','v']},{label:'wxyz',chars:['w','x','y','z']},{label:'⌫', action:'backspace'}],
  [{label:'◉', action:'mode'},{label:'␣', action:'space'},{label:'↵', action:'enter'}],
];

// --- Swipe directions ---
const SWIPE_DIRS = [
  {dir:'←', label:'left', letters:'ABCD'},
  {dir:'→', label:'right', letters:'EFGH'},
  {dir:'↑', label:'up', letters:'IJKLM'},
  {dir:'↓', label:'down', letters:'NOPQR'},
  {dir:'↙', label:'downleft', letters:'ST'},
  {dir:'↘', label:'downright', letters:'UV'},
  {dir:'↖', label:'upleft', letters:'WX'},
  {dir:'↗', label:'upright', letters:'YZ'},
];

// --- Android bridge helpers ---
function bridgeCommit(ch) {
  try { Android.commitChar(ch); } catch(e) { console.error('bridge:', e); }
}
function bridgeDelete() {
  try { Android.deleteBackward(); } catch(e) { console.error('bridge:', e); }
}
function bridgeEnter() {
  try { Android.sendEnter(); } catch(e) { console.error('bridge:', e); }
}
function bridgeVibrate(ms) {
  try { Android.vibrate(ms); } catch(e) { /* no vibrate */ }
}

// --- Core functions ---
function commitComp() {
  if (composition) {
    bridgeCommit(composition);
    composition = '';
    updateCompDisplay();
  }
}

function insertChar(ch) {
  commitComp();
  bridgeCommit(ch);
  bridgeVibrate(10);
}

function deleteChar() {
  if (composition) {
    composition = '';
    updateCompDisplay();
    clearTimeout(tapTimeout);
    return;
  }
  bridgeDelete();
  bridgeVibrate(15);
}

function moveCursor(dir) {
  try { Android.moveCursor(dir); } catch(e) { /* ignore */ }
  bridgeVibrate(5);
}

function handleMode() {
  commitComp();
  const modes = ['compact','t9','swipe'];
  const idx = modes.indexOf(inputMode);
  inputMode = modes[(idx + 1) % 3];
  renderKeyboard();
}

// --- Multi-tap ---
function handleCharKey(k) {
  if (k.single) { insertChar(k.chars[0]); return; }
  if (!k.chars || k.chars.length === 0) return;

  clearTimeout(tapTimeout);

  if (composition) {
    const idx = k.chars.indexOf(composition);
    if (idx >= 0 && idx < k.chars.length - 1) {
      composition = k.chars[idx + 1];
    } else {
      commitComp();
      composition = k.chars[0];
    }
  } else {
    composition = k.chars[0];
  }
  updateCompDisplay();

  // Auto-commit after timeout
  tapTimeout = setTimeout(function() {
    commitComp();
  }, COMP_TIMEOUT);
}

// --- Key handler ---
function handleKey(k) {
  if (k.action === 'backspace') { deleteChar(); return; }
  if (k.action === 'space') { insertChar(' '); return; }
  if (k.action === 'enter') { commitComp(); bridgeEnter(); return; }
  if (k.action === 'left') { moveCursor('left'); return; }
  if (k.action === 'right') { moveCursor('right'); return; }
  if (k.action === 'up') { moveCursor('up'); return; }
  if (k.action === 'down') { moveCursor('down'); return; }
  if (k.action === 'mode') { handleMode(); return; }
  // Character key
  handleCharKey(k);
}

// --- Composition display ---
function updateCompDisplay() {
  var el = document.getElementById('compDisplay');
  if (!composition && el) { el.remove(); return; }
  if (!composition) return;
  if (!el) {
    el = document.createElement('div');
    el.id = 'compDisplay';
    el.className = 'ckb-comp';
    document.getElementById('root').appendChild(el);
  }
  el.textContent = composition;
}

// --- Render keyboard ---
function renderKeyboard() {
  var kb = document.getElementById('kb');
  kb.innerHTML = '';
  var compEl = document.getElementById('compDisplay');
  if (compEl) compEl.remove();
  clearTimeout(tapTimeout);
  composition = '';

  if (inputMode === 'compact') {
    var row = document.createElement('div');
    row.className = 'ckb-row-single';
    COMPACT_KEYS.forEach(function(k) {
      var btn = document.createElement('button');
      var isSpecial = k.action === 'backspace' || k.action === 'mode';
      btn.className = 'ckb-key' + (isSpecial ? ' ckb-key-special' : '') + ' ckb-key-compact';

      if (k.chars && !k.single) {
        // Multi-tap key
        var big = document.createElement('span');
        big.className = 'ckb-key-primary';
        big.textContent = k.chars[0];
        var small = document.createElement('span');
        small.className = 'ckb-key-secondary';
        small.textContent = k.label;
        btn.appendChild(big);
        btn.appendChild(small);

        btn.onpointerdown = (function(b, k, bigEl) {
          return function(e) {
            e.preventDefault();
            if (composition && k.chars.indexOf(composition) >= 0) {
              bigEl.textContent = composition;
            } else {
              bigEl.textContent = k.chars[0];
            }
            handleKey(k);
            b.classList.add('ckb-key-active');
          };
        })(btn, k, big);

        btn.onpointerup = (function(b) { return function() { b.classList.remove('ckb-key-active'); }; })(btn);
        btn.onpointerleave = (function(b) { return function() { b.classList.remove('ckb-key-active'); }; })(btn);
      } else {
        btn.textContent = k.label;
        btn.onpointerdown = (function(b, k) {
          return function(e) {
            e.preventDefault();
            handleKey(k);
            b.classList.add('ckb-key-active');
          };
        })(btn, k);
        btn.onpointerup = (function(b) { return function() { b.classList.remove('ckb-key-active'); }; })(btn);
        btn.onpointerleave = (function(b) { return function() { b.classList.remove('ckb-key-active'); }; })(btn);
      }
      row.appendChild(btn);
    });
    kb.appendChild(row);
  }
  else if (inputMode === 't9') {
    T9_KEYS.forEach(function(rowDef) {
      var row = document.createElement('div');
      row.className = 'ckb-row';
      rowDef.forEach(function(k) {
        var btn = document.createElement('button');
        btn.className = 'ckb-key';
        if (k.action) btn.classList.add('ckb-key-special');
        if (k.action === 'space') btn.classList.add('ckb-key-space');
        btn.textContent = k.label;
        btn.onpointerdown = (function(b, k) {
          return function(e) {
            e.preventDefault();
            handleKey(k);
            b.classList.add('ckb-key-active');
          };
        })(btn, k);
        btn.onpointerup = (function(b) { return function() { b.classList.remove('ckb-key-active'); }; })(btn);
        btn.onpointerleave = (function(b) { return function() { b.classList.remove('ckb-key-active'); }; })(btn);
        row.appendChild(btn);
      });
      kb.appendChild(row);
    });
  }
  else if (inputMode === 'swipe') {
    var row = document.createElement('div');
    row.className = 'ckb-row';
    row.style.flexWrap = 'wrap';
    SWIPE_DIRS.forEach(function(d) {
      var btn = document.createElement('button');
      btn.className = 'ckb-key ckb-key-special ckb-key-compact';
      btn.style.flex = '1 1 22%';
      btn.style.margin = '1px';
      btn.innerHTML = '<span style="font-size:14px">' + d.dir + '</span><span style="font-size:7px;opacity:0.5;color:var(--ckb-key-text-secondary)">' + d.letters + '</span>';
      btn.onpointerdown = (function(b) { return function(e) { e.preventDefault(); b.classList.add('ckb-key-active'); }; })(btn);
      btn.onpointerup = (function(b) { return function() { b.classList.remove('ckb-key-active'); }; })(btn);
      btn.onpointerleave = (function(b) { return function() { b.classList.remove('ckb-key-active'); }; })(btn);
      row.appendChild(btn);
    });
    // Bottom: backspace + space
    var bs = document.createElement('button');
    bs.className = 'ckb-key ckb-key-special';
    bs.style.flex = '1 1 30%';
    bs.style.margin = '1px';
    bs.textContent = '⌫';
    bs.onpointerdown = function(e) { e.preventDefault(); deleteChar(); };
    row.appendChild(bs);
    var sp = document.createElement('button');
    sp.className = 'ckb-key ckb-key-special';
    sp.style.flex = '1 1 22%';
    sp.style.margin = '1px';
    sp.textContent = '␣';
    sp.onpointerdown = function(e) { e.preventDefault(); insertChar(' '); };
    row.appendChild(sp);
    kb.appendChild(row);
  }
}

// --- Init ---
renderKeyboard();

// Disable Android back button closing WebView
document.addEventListener('backbutton', function(e) {
  try { Android.performBack(); } catch(ex) {}
}, false);
</script>
</body>
</html>
