<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Compact KB</title>
<style>
html,body{width:100%;height:100%;margin:0;padding:0;background:#1c1c1e;color:#fff;font:14px Roboto,sans-serif;overflow:hidden}
#status{position:absolute;bottom:0;right:4px;font-size:8px;color:#444;z-index:99}
.row{display:flex;gap:2px;margin-bottom:2px}
.btn{flex:1;padding:7px 0;background:#2c2c2e;border:none;border-radius:4px;color:#fff;font-size:11px;text-align:center;touch-action:manipulation}
.btn:active,.btn.down{background:#3a3a3c}
.btn.sp{background:#3a3a3c}
.btn.wide{flex:1.8}
.top{display:flex;justify-content:space-between;padding:2px 4px;margin-bottom:1px;font-size:9px;color:#888}
.top button{background:0 0;border:none;color:#0a84ff;font-size:10px;padding:2px 6px}
</style>
</head>
<body>
<div id="app">Loading...</div>
<div id="status">v1</div>
<script>
document.getElementById('app').innerHTML='Rendering...';

var lang='en',comp='',sym=false,md='compact';

var layout={
 en:[
  [{t:'abc',c:'abc'},{t:'def',c:'def'},{t:'ghi',c:'ghi'},{t:'jkl',c:'jkl'},{t:'mno',c:'mno'},{t:'pqrs',c:'pqrs'},{t:'tuv',c:'tuv'},{t:'wxyz',c:'wxyz'}],
  [{t:'/',c:'/'},{t:'#',c:'#'},{t:'←',a:'left'},{t:'↑',a:'up'},{t:'↓',a:'down'},{t:'→',a:'right'},{t:'⌫',a:'del',sp:1}],
  [{t:'🌐',a:'lang',sp:1},{t:'␣',a:'space',w:1},{t:'↵',a:'enter',w:1},{t:'123',a:'num',sp:1},{t:'◉',a:'mode',sp:1}]
 ],
 ar:[
  [{t:'ابت',c:'ابت'},{t:'ثجح',c:'ثجح'},{t:'خدذ',c:'خدذ'},{t:'رزس',c:'رزس'},{t:'شصض',c:'شصض'},{t:'طظع',c:'طظع'},{t:'غفق',c:'غفق'},{t:'كلم',c:'كلم'},{t:'نهوي',c:'نهوي'}],
  [{t:'/',c:'/'},{t:'#',c:'#'},{t:'←',a:'left'},{t:'↑',a:'up'},{t:'↓',a:'down'},{t:'→',a:'right'},{t:'⌫',a:'del',sp:1}],
  [{t:'EN',a:'lang',sp:1},{t:'␣',a:'space',w:1},{t:'↵',a:'enter',w:1},{t:'123',a:'num',sp:1},{t:'◉',a:'mode',sp:1}]
 ]
};

function render(){
 try{
  var app=document.getElementById('app');
  if(!app)return;
  app.innerHTML='';
  // top bar
  var tb=document.createElement('div');tb.style.cssText='display:flex;justify-content:space-between;padding:2px 4px;margin-bottom:1px;font-size:9px;color:#888';
  tb.innerHTML='<span>'+md+'</span><div><button onclick="try{Android.switchToNextIME()}catch(e){}" style="background:0;border:none;color:#0a84ff;font-size:10px">⌨️</button><button onclick="try{Android.performBack()}catch(e){}" style="background:0;border:none;color:#0a84ff;font-size:10px">✕</button></div>';
  app.appendChild(tb);
  // rows
  var rows;
  if(sym){
   rows=[
    [{t:'1',c:'1'},{t:'2',c:'2'},{t:'3',c:'3'},{t:'4',c:'4'},{t:'5',c:'5'},{t:'6',c:'6'},{t:'7',c:'7'},{t:'8',c:'8'},{t:'9',c:'9'},{t:'0',c:'0'}],
    [{t:'@',c:'@'},{t:'!',c:'!'},{t:'?',c:'?'},{t:'.',c:'.'},{t:',',c:','},{t:\"'\",c:\"'\"},{t:'\"',c:'\"'},{t:';',c:';'},{t:':',c:':'},{t:'-',c:'-'}],
    [{t:'💬',a:'lang'},{t:'␣',a:'space',w:1},{t:'↵',a:'enter',w:1},{t:'ABC',a:'num'},{t:'⌫',a:'del',sp:1}]
   ];
  }else{rows=layout[lang];}
  for(var ri=0;ri<rows.length;ri++){
   var r=document.createElement('div');r.style.cssText='display:flex;gap:2px;margin-bottom:2px';
   var keys=rows[ri];
   for(var ki=0;ki<keys.length;ki++){
    (function(k){
     var b=document.createElement('button');
     b.style.cssText='flex:1;padding:7px 0;background:#2c2c2e;border:none;border-radius:4px;color:#fff;font-size:11px;text-align:center';
     if(k.sp)b.style.background='#3a3a3c';
     if(k.w)b.style.flex='1.8';
     b.textContent=k.t;
     b.onclick=function(){handle(k);};
     r.appendChild(b);
    })(keys[ki]);
   }
   app.appendChild(r);
  }
 }catch(e){
  document.getElementById('app').innerHTML='Error: '+e.message;
 }
}

function handle(k){
 try{
  if(k.a=='del'){comp='';Android.deleteBackward();return;}
  if(k.a=='left'||k.a=='right'||k.a=='up'||k.a=='down'){comp='';Android.moveCursor(k.a);return;}
  if(k.a=='space'){comp='';Android.commitText(' ');return;}
  if(k.a=='enter'){comp='';Android.sendEnter();return;}
  if(k.a=='lang'){lang=(lang=='en')?'ar':'en';sym=false;render();return;}
  if(k.a=='num'){sym=!sym;comp='';render();return;}
  if(k.a=='mode'){
   var ms=['compact','t9','swipe'];var i=ms.indexOf(md);md=ms[(i+1)%3];
   render();return;
  }
  if(!k.c)return;
  if(k.c.length>1){
   if(comp){
    var i=k.c.indexOf(comp);
    if(i>=0&&i<k.c.length-1){comp=k.c[i+1];}else{Android.commitText(comp);comp=k.c[0];}
   }else{comp=k.c[0];}
   Android.vibrate(8);
   return;
  }
  Android.commitText(k.c);
  Android.vibrate(8);
 }catch(e){
  document.getElementById('status').textContent='err:'+e.message;
 }
}

render();
document.getElementById('status').textContent='loaded';
</script>
</body>
</html>
