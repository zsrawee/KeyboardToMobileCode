<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Compact Keyboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:#1c1c1e;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;touch-action:manipulation}
#root{width:100%;height:100%;display:flex;flex-direction:column;position:relative}

:root {
  --ckb-font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  --ckb-bg:#1c1c1e;
  --ckb-key-bg:#2c2c2e;
  --ckb-key-bg-active:#3a3a3c;
  --ckb-key-text:#fff;
  --ckb-key-text-secondary:#8e8e93;
  --ckb-key-border-radius:6px;
  --ckb-key-gap:2px;
  --ckb-prediction-bg:#2c2c2e;
  --ckb-prediction-text:#0a84ff;
  --ckb-special-key-bg:#3a3a3c;
}

/* Prediction bar */
.ckb-pred{display:flex;gap:4px;padding:4px 8px;overflow-x:auto;scrollbar-width:none;background:var(--ckb-bg);border-bottom:1px solid rgba(128,128,128,0.15);min-height:32px}
.ckb-pred::-webkit-scrollbar{display:none}
.ckb-pred button{flex-shrink:0;padding:2px 10px;border:none;border-radius:12px;background:var(--ckb-prediction-bg);color:var(--ckb-prediction-text);font-size:13px;font-weight:500;white-space:nowrap}
.ckb-pred button:active{opacity:.7}

/* Keyboard body */
.ckb-body{background:var(--ckb-bg);padding:2px;display:flex;flex-direction:column;gap:var(--ckb-key-gap);width:100%}
.ckb-row{display:flex;gap:var(--ckb-key-gap);flex:1;justify-content:center;width:100%}
.ckb-row-single{display:flex;gap:1px;flex:1;align-items:stretch;justify-content:space-evenly;width:100%}

/* Keys */
.ckb-key{display:flex;align-items:center;justify-content:center;flex:1;background:var(--ckb-key-bg);color:var(--ckb-key-text);border:none;border-radius:var(--ckb-key-border-radius);font-size:11px;font-weight:500;padding:0 1px;position:relative;-webkit-tap-highlight-color:transparent;outline:none;min-width:0;font-family:var(--ckb-font-family);line-height:1;min-height:38px;touch-action:manipulation}
.ckb-key:active,.ckb-key-active{background:var(--ckb-key-bg-active)!important;transform:scale(0.95)}
.ckb-key-special{background:var(--ckb-special-key-bg);font-size:14px}
.ckb-key-wide{flex:1.5}
.ckb-key-space{flex:2.5}

/* Compact key */
.ckb-key-compact{font-size:9px;letter-spacing:-0.3px;flex-direction:column;padding:1px 0}
.ckb-key-compact .ckb-primary{font-size:12px;font-weight:600}
.ckb-key-compact .ckb-secondary{font-size:7px;color:var(--ckb-key-text-secondary);letter-spacing:-0.2px}

/* Composition popup */
.ckb-comp{position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:var(--ckb-prediction-bg);color:var(--ckb-prediction-text);font-size:14px;font-weight:600;padding:2px 14px;border-radius:8px 8px 0 0;z-index:10;white-space:nowrap}

/* Status (loaded indicator) */
#status{position:absolute;bottom:2px;right:4px;font-size:8px;color:#555;pointer-events:none}
</style>
</head>
<body>
<div id="root">
  <div id="predBar" class="ckb-pred"></div>
  <div id="kb" class="ckb-body"></div>
  <div id="status">⌨️ loaded</div>
</div>
<script>
// ============================================================
// Compact Keyboard – Android IME WebView
// ============================================================

var composition = '';
var inputMode = 'compact';
var tapTimeout = null;
var COMP_TIMEOUT = 1200;

// --- Layouts ---
var COMPACT_KEYS = [
  {l:'abc', c:['a','b','c']},
  {l:'def', c:['d','e','f']},
  {l:'ghi', c:['g','h','i']},
  {l:'jkl', c:['j','k','l']},
  {l:'mno', c:['m','n','o']},
  {l:'pqrs',c:['p','q','r','s']},
  {l:'tuv', c:['t','u','v']},
  {l:'wxyz',c:['w','x','y','z']},
  {l:'/',   c:['/'], s:true},
  {l:'#',   c:['#'], s:true},
  {l:'←',   a:'left'},
  {l:'↑',   a:'up'},
  {l:'↓',   a:'down'},
  {l:'→',   a:'right'},
  {l:'⌫',   a:'backspace'},
  {l:'◉',   a:'mode'},
];

var T9_KEYS = [
  [{l:'abc',c:['a','b','c']},{l:'def',c:['d','e','f']},{l:'ghi',c:['g','h','i']}],
  [{l:'jkl',c:['j','k','l']},{l:'mno',c:['m','n','o']},{l:'pqrs',c:['p','q','r','s']}],
  [{l:'tuv',c:['t','u','v']},{l:'wxyz',c:['w','x','y','z']},{l:'⌫',a:'backspace'}],
  [{l:'◉',a:'mode'},{l:'␣',a:'space'},{l:'↵',a:'enter'}],
];

var SWIPE_DIRS = [
  {d:'←',ll:'ABCD'},{d:'→',ll:'EFGH'},{d:'↑',ll:'IJKLM'},{d:'↓',ll:'NOPQR'},
  {d:'↙',ll:'ST'},{d:'↘',ll:'UV'},{d:'↖',ll:'WX'},{d:'↗',ll:'YZ'},
];

// --- Android bridge ---
function brCommit(ch) {
  try { if (window.Android) Android.commitChar(ch); } catch(e) { console.log('bridge err:', e); }
}
function brDelete() {
  try { if (window.Android) Android.deleteBackward(); } catch(e) { console.log('bridge err:', e); }
}
function brEnter() {
  try { if (window.Android) Android.sendEnter(); } catch(e) { console.log('bridge err:', e); }
}
function brMove(d) {
  try { if (window.Android) Android.moveCursor(d); } catch(e) { console.log('bridge err:', e); }
}
function brVib(ms) {
  try { if (window.Android) Android.vibrate(ms); } catch(e) { /* no vib */ }
}

// --- Core ---
function commitComp() {
  if (composition) {
    brCommit(composition);
    composition = '';
    showComp();
  }
}
function insertChar(ch) {
  commitComp();
  brCommit(ch);
  brVib(10);
}
function deleteChar() {
  if (composition) {
    composition = '';
    showComp();
    clearTimeout(tapTimeout);
    return;
  }
  brDelete();
  brVib(15);
}
function moveCursor(d) {
  brMove(d);
  brVib(5);
}
function switchMode() {
  commitComp();
  var modes = ['compact','t9','swipe'];
  var idx = modes.indexOf(inputMode);
  inputMode = modes[(idx + 1) % 3];
  renderKeys();
}

// --- Multi-tap ---
function handleChar(k) {
  if (k.s) { insertChar(k.c[0]); return; }
  if (!k.c || k.c.length === 0) return;
  clearTimeout(tapTimeout);
  if (composition) {
    var idx = k.c.indexOf(composition);
    if (idx >= 0 && idx < k.c.length - 1) {
      composition = k.c[idx + 1];
    } else {
      commitComp();
      composition = k.c[0];
    }
  } else {
    composition = k.c[0];
  }
  showComp();
  tapTimeout = setTimeout(function() { commitComp(); }, COMP_TIMEOUT);
}

// --- Key handler ---
function onKey(k) {
  if (k.a === 'backspace') { deleteChar(); return; }
  if (k.a === 'space') { insertChar(' '); return; }
  if (k.a === 'enter') { commitComp(); brEnter(); return; }
  if (k.a === 'left') { moveCursor('left'); return; }
  if (k.a === 'right') { moveCursor('right'); return; }
  if (k.a === 'up') { moveCursor('up'); return; }
  if (k.a === 'down') { moveCursor('down'); return; }
  if (k.a === 'mode') { switchMode(); return; }
  handleChar(k);
}

// --- Composition display ---
function showComp() {
  var el = document.getElementById('compDisplay');
  if (!composition && el) { el.remove(); return; }
  if (!composition) return;
  if (!el) {
    el = document.createElement('div');
    el.id = 'compDisplay';
    el.className = 'ckb-comp';
    document.getElementById('root').appendChild(el);
  }
  el.textContent = composition;
}

// --- Event helper: uses touchstart for Android WebView (pointerdown fires twice on some devices) ---
var _pressed = null;
function onPress(el, fn) {
  function start(e) {
    e.preventDefault();
    if (_pressed === el) return; // guard against double-fire
    _pressed = el;
    fn();
    el.classList.add('ckb-key-active');
  }
  function end(e) {
    if (_pressed === el) _pressed = null;
    el.classList.remove('ckb-key-active');
  }
  el.addEventListener('touchstart', start);
  el.addEventListener('touchend', end);
  el.addEventListener('touchcancel', end);
  // pointerdown as fallback for non-touch
  el.addEventListener('pointerdown', start);
  el.addEventListener('pointerup', end);
  el.addEventListener('pointerleave', end);
}

// --- Render ---
function renderKeys() {
  var kb = document.getElementById('kb');
  kb.innerHTML = '';
  var compEl = document.getElementById('compDisplay');
  if (compEl) compEl.remove();
  clearTimeout(tapTimeout);
  composition = '';
  document.getElementById('status').textContent = '⌨️ ' + inputMode;

  if (inputMode === 'compact') {
    var row = document.createElement('div');
    row.className = 'ckb-row-single';
    COMPACT_KEYS.forEach(function(k) {
      var btn = document.createElement('button');
      var sp = k.a === 'backspace' || k.a === 'mode';
      btn.className = 'ckb-key' + (sp ? ' ckb-key-special' : '') + ' ckb-key-compact';

      if (k.c && !k.s) {
        // Multi-tap key
        var big = document.createElement('span');
        big.className = 'ckb-primary';
        big.textContent = k.c[0];
        var small = document.createElement('span');
        small.className = 'ckb-secondary';
        small.textContent = k.l;
        btn.appendChild(big);
        btn.appendChild(small);
        onPress(btn, function() {
          // Update the big letter based on current composition
          if (composition && k.c.indexOf(composition) >= 0) {
            big.textContent = composition;
          } else {
            big.textContent = k.c[0];
          }
          onKey(k);
        });
      } else {
        btn.textContent = k.l;
        onPress(btn, function() { onKey(k); });
      }
      row.appendChild(btn);
    });
    kb.appendChild(row);
  }
  else if (inputMode === 't9') {
    T9_KEYS.forEach(function(rowDef) {
      var row = document.createElement('div');
      row.className = 'ckb-row';
      rowDef.forEach(function(k) {
        var btn = document.createElement('button');
        btn.className = 'ckb-key';
        if (k.a) btn.classList.add('ckb-key-special');
        if (k.a === 'space') btn.classList.add('ckb-key-space');
        btn.textContent = k.l;
        onPress(btn, function() { onKey(k); });
        row.appendChild(btn);
      });
      kb.appendChild(row);
    });
  }
  else if (inputMode === 'swipe') {
    var row = document.createElement('div');
    row.className = 'ckb-row';
    row.style.flexWrap = 'wrap';
    SWIPE_DIRS.forEach(function(d) {
      var btn = document.createElement('button');
      btn.className = 'ckb-key ckb-key-special ckb-key-compact';
      btn.style.flex = '1 1 22%';
      btn.style.margin = '1px';
      btn.innerHTML = '<span style="font-size:14px">' + d.d + '</span><span style="font-size:7px;opacity:.5">' + d.ll + '</span>';
      onPress(btn, function() { /* swipe mode - just visual for now */ });
      row.appendChild(btn);
    });
    var bs = document.createElement('button');
    bs.className = 'ckb-key ckb-key-special';
    bs.style.flex = '1 1 30%';
    bs.style.margin = '1px';
    bs.textContent = '⌫';
    onPress(bs, function() { deleteChar(); });
    row.appendChild(bs);
    var sp = document.createElement('button');
    sp.className = 'ckb-key ckb-key-special';
    sp.style.flex = '1 1 22%';
    sp.style.margin = '1px';
    sp.textContent = '␣';
    onPress(sp, function() { insertChar(' '); });
    row.appendChild(sp);
    kb.appendChild(row);
  }
}

// --- Init ---
renderKeys();
document.getElementById('status').textContent = '⌨️ ' + inputMode + ' ✓';
</script>
</body>
</html>
