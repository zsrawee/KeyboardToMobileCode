<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>KB</title>
<style>
body{margin:0;padding:0;background:#1c1c1e;color:#fff;font:14px sans-serif;overflow:hidden}
#app{padding:2px}
.r{display:flex;gap:2px;margin-bottom:2px}
.k{flex:1;padding:6px 0;background:#2c2c2e;border:none;border-radius:4px;color:#fff;font-size:12px;text-align:center}
.k:active{background:#3a3a3c}
.s{background:#3a3a3c}
.w{flex:1.8}
</style>
</head>
<body>
<div id="app">
<div class="r">
 <button class="k" onclick="c('a')">a</button>
 <button class="k" onclick="c('b')">b</button>
 <button class="k" onclick="c('c')">c</button>
</div>
<div class="r">
 <button class="k s" onclick="del()">⌫</button>
 <button class="k w" onclick="sp()">␣</button>
 <button class="k w" onclick="en()">↵</button>
</div>
</div>
<script>
function c(ch){try{Android.commitText(ch);}catch(e){}try{Android.vibrate(8);}catch(e){}}
function del(){try{Android.deleteBackward();}catch(e){}}
function sp(){try{Android.commitText(' ');}catch(e){}}
function en(){try{Android.sendEnter();}catch(e){}}
try{Android.vibrate(1);}catch(e){}
</script>
</body>
</html>
